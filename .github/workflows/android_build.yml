name: 🚀 SoundGuard Pro - Production Build & Release

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build APK (Debug)
      run: ./gradlew assembleDebug --stacktrace --no-daemon

    - name: Build Bundle (AAB Debug)
      run: ./gradlew bundleDebug --stacktrace --no-daemon

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: SoundGuardPro-APK
        path: app/build/outputs/apk/debug/*.apk

    - name: Upload AAB
      uses: actions/upload-artifact@v4
      with:
        name: SoundGuardPro-AAB
        path: app/build/outputs/bundle/debug/*.aab
