name: 🚀 SoundGuard Pro - Production Build & Release

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 7.5
        cache-disabled: true

    - name: Generate Gradle Wrapper
      run: |
        gradle wrapper --gradle-version 7.5
        chmod +x gradlew

    - name: Build APK (Release)
      run: ./gradlew assembleRelease --stacktrace --info --no-daemon

    - name: Build Bundle (AAB)
      run: ./gradlew bundleRelease --stacktrace --info --no-daemon

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: SoundGuardPro-APK
        path: app/build/outputs/apk/release/*.apk

    - name: Upload AAB
      uses: actions/upload-artifact@v4
      with:
        name: SoundGuardPro-AAB
        path: app/build/outputs/bundle/release/*.aab
